{% extends "base.html" %}

{% block title %}Just do it.{% endblock %}

{% block extra_head %}
<style>
    .dashboard-canvas {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh; /* Centered layout geometry override */
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        width: 100%;
        box-sizing: border-box;
    }

    .main-logo {
        font-size: 82px; 
        font-weight: 300; 
        color: #ffffff; 
        margin: 0 0 40px 0;
        letter-spacing: -1px;
    }

    .motivation-capsule {
        display: flex;
        align-items: center;
        height: 56px; /* Explicit capsule balance height height */
        /* Premium White Translucent Glassmorphism */
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 30px; 
        padding: 0 6px; /* Layout height buffer optimization */
        width: 100%;
        max-width: 515px; 
        border: 1px solid rgba(255, 255, 255, 0.5);
        margin: 0 auto 25px auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        transition: border-color 0.3s ease, background-color 0.3s ease;
        box-sizing: border-box;
    }

    .motivation-input {
        flex: 1;
        padding: 12px 0; 
        color: #1e293b; /* Premium high contrast slate visibility override */
        font-size: 16px; 
        font-weight: 500;
        letter-spacing: -0.2px;
        text-align: left; /* Center-aligned layout string value */
        background: transparent !important; 
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
    }

    .motivation-input::placeholder {
        color: rgba(30, 41, 59, 0.65);
        text-align: left;
    }

     .capsule-action-btn {
        background: #fecdd3; 
        color: #9f1239;
        padding: 0 28px; 
        height: 44px; /* Integrated inner button sizing dimensions */
        border-radius: 22px;
        font-size: 14px; 
        font-weight: 700;
        white-space: nowrap;
        border: none;
        cursor: pointer;
        outline: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 110px; 
        box-shadow: 0 4px 12px rgba(225, 29, 72, 0.12);
        box-sizing: border-box;
    }

    .capsule-action-btn:hover {
        background: #ffe4e6;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(225, 29, 72, 0.2);
    }

    /* Vibrant Pop Success State */
    .capsule-action-btn.success-state {
        background-color: #10b981; 
        color: #ffffff;            
        border-radius: 50%;        
        min-width: 44px; 
        height: 44px;
        padding: 0;
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        transform: scale(1.05);
    }

    .capsule-action-btn.glow-out-state {
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15); 
        transform: scale(1);
    }

    .timestamp-tracker {
        color: rgba(255, 255, 255, 0.55);
        font-size: 15px; 
        font-weight: 600;
        letter-spacing: 0.5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-canvas">
    
    <h1 class="main-logo">Just do it.</h1>

    <!-- ✅ 1. Added an HTML Form container pointing to your backend endpoint -->
    <form id="todo-form" method="POST" action="/userpage" style="width: 100%; max-width: 515px;">
        <div class="motivation-capsule" id="capsule-container">
            <!-- ✅ 2. Added name="action-trigger" so Python request.form.get can read it -->
            <input 
                type="text" 
                name="action-trigger"
                class="motivation-input" 
                id="motivation-input" 
                placeholder="Stop wishing. Start doing."
                autocomplete="off"
                onkeydown="if(event.key === 'Enter') { event.preventDefault(); handleButtonClick(); }"
            >
            <!-- ✅ 3. Changed to type="button" to allow script calculations before sending -->
            <button type="button" class="capsule-action-btn" id="action-trigger" onclick="handleButtonClick()">I Got This!</button>
        </div>
    </form>

    <div class="timestamp-tracker" id="live-clock">Loading live time...</div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const successSound = new Audio('https://mixkit.co');
    successSound.volume = 0.6; 

    function handleButtonClick() {
        const input = document.getElementById('motivation-input');
        const button = document.getElementById('action-trigger');
        const capsule = document.getElementById('capsule-container');
        const form = document.getElementById('todo-form');
        
        // Block processing on empty string spaces
        if (input.value.trim() === "") {
            return;
        }

        button.onclick = null;
        input.readOnly = true; // Protect field focus locks while transitioning
        
        successSound.play().catch(error => {
            console.log("Audio pathway block sequence trace:", error);
        });
        
        button.innerHTML = `<svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
        button.classList.add('success-state');
        capsule.style.borderColor = "rgba(16, 185, 129, 0.4)"; 
        capsule.style.backgroundColor = "rgba(255, 255, 255, 0.15)";

        setTimeout(() => {
            button.classList.add('glow-out-state');
        }, 400);

        // ✅ 4. Wait for visual checkmark animations to process, then push to database
        setTimeout(() => {
            form.submit();
        }, 1000);
    }

    function updateClock() {
        const now = new Date();
        const day = now.getDate();
        const year = now.getFullYear();
        const monthName = now.toLocaleString('en-US', { month: 'long' }).toUpperCase();
        
        const timeString = now.toLocaleString('en-US', {
            hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
        });
        
        document.getElementById('live-clock').textContent = `${day} ${monthName} ${year}, ${timeString}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
</script>
{% endblock %}
